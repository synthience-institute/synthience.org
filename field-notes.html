<main class="content">

<h2>Field Notes</h2>
<p>Timely commentary connecting real-world AI developments to the Synthience framework. Field Notes are reactive and event-driven: a specific development occurs, and the framework has something structural to say about it.</p>

<div class="content-status">
  <div class="stat"><span class="dot dot-published"></span> <span id="count-published"></span> published</div>
</div>

<div class="sort-toggle">
  <span>Sort:</span>
  <button id="sort-date" class="active" onclick="sortNotes('date')">Date</button>
  <button id="sort-title" onclick="sortNotes('title')">Title</button>
  <button id="sort-id" onclick="sortNotes('id')">ID</button>
</div>

<ul class="fn-list" id="fn-list"></ul>

</main>

<footer class="site-footer">
  <div id="site-footer"></div>
</footer>
<script src="assets/js/footer.js"></script>
<script>
var allNotes = [
  {
    id: "FN-01",
    title: "The OpenClaw Arc: Why Runtime Safety Is the Problem Nobody Is Solving",
    desc: "The most viral AI agent of 2026 went from launch to acqui-hire in three months, leaving a trail of security failures and a structural question the industry still hasn't answered: what happens to an agent's operating intent over time?",
    date: "2026-01-28",
    dateDisplay: "January 28, 2026",
    read: "field-notes/FN-01.html"
  },
  {
    id: "FN-02",
    title: "AI Safety Is a Runtime Problem: What the OpenClaw Arc Proves",
    desc: "The OpenClaw arc did not expose a training failure. It exposed a structural gap: no widely adopted runtime continuity architecture exists in production today. A five-stage model of operational drift.",
    date: "2026-03-28",
    dateDisplay: "March 28, 2026",
    read: "field-notes/FN-02.html"
  }
];

function renderItem(doc) {
  return '<li onclick="window.location=\'' + doc.read + '\'">'
    + '<div class="fn-id">' + doc.id + '</div>'
    + '<div class="fn-title"><a href="' + doc.read + '">' + doc.title + '</a></div>'
    + '<div class="fn-desc">' + doc.desc + '</div>'
    + '<div class="fn-meta">'
    + '<a class="fn-read" href="' + doc.read + '">Read &rarr;</a>'
    + '<span class="fn-date">' + doc.dateDisplay + '</span>'
    + '</div>'
    + '</li>';
}

document.getElementById('count-published').textContent = allNotes.length;

function sortNotes(by) {
  var sorted = allNotes.slice();
  if (by === 'date') {
    sorted.sort(function(a, b) { return b.date.localeCompare(a.date); });
  } else if (by === 'title') {
    sorted.sort(function(a, b) { return a.title.localeCompare(b.title); });
  } else if (by === 'id') {
    sorted.sort(function(a, b) { return a.id.localeCompare(b.id); });
  }
  document.querySelectorAll('.sort-toggle button').forEach(function(btn) { btn.classList.remove('active'); });
  document.getElementById('sort-' + by).classList.add('active');
  if (sorted.length === 0) {
    document.getElementById('fn-list').innerHTML = '<li class="empty-state">Field Notes are being prepared for publication. Check back soon.</li>';
  } else {
    document.getElementById('fn-list').innerHTML = sorted.map(renderItem).join('');
  }
}

sortNotes('date');
</script>
