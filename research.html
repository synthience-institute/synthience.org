  <style>
  .corpus-status {
    display: inline-flex;
    gap: 1.4rem;
    align-items: center;
    background: #f4f2ec;
    border: 1.5px solid #c8c4b8;
    border-radius: 6px;
    padding: 0.6rem 1.2rem;
    margin: 1.2rem 0 1.8rem 0;
    font-size: 0.92rem;
    color: #444;
  }
  .corpus-status .stat { display: flex; align-items: center; gap: 0.4rem; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-published { background: #5a9a6f; }

  /* === SEARCH INPUT === */
  .search-container { margin-bottom: 1rem; }
  .search-input {
    width: 100%;
    padding: 0.45rem 0.8rem;
    border: 1.5px solid #c8c0b0;
    border-radius: 4px;
    font-family: 'Poppins', Arial, sans-serif;
    font-size: 0.85rem;
    color: #3a3530;
    background: #faf9f5;
    box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .search-input:focus { outline: none; border-color: #c8604a; }
  .search-input::placeholder { color: #b0a898; }

  .doc-toggle {
    margin: 0 0 0.5rem 0;
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .doc-toggle button {
    padding: 5px 14px;
    font-size: 0.85rem;
    font-family: 'Poppins', sans-serif;
    border: 1.5px solid #c8c4b8;
    border-radius: 4px;
    background: #faf9f5;
    cursor: pointer;
    color: #444;
    transition: all 0.15s;
  }
  .doc-toggle button.active {
    background: #c8604a;
    border-color: #c8604a;
    color: #fff;
  }
  .doc-toggle button:hover:not(.active) {
    border-color: #c8604a;
    color: #c8604a;
  }

  /* === CATEGORY SECTIONS === */
  .doc-section { margin-bottom: 2rem; }
  .doc-section-header {
    display: flex;
    align-items: center;
    cursor: pointer;
    margin-bottom: 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid #e0dcd4;
    user-select: none;
  }
  .doc-section-header h3 {
    font-size: 1.05rem;
    color: #3a3530;
    margin: 0;
    flex: 1;
  }
  .doc-section-chevron {
    font-size: 0.75rem;
    color: #8a7f72;
    transition: transform 0.2s;
    margin-left: 0.5rem;
  }
  .doc-section-chevron.collapsed { transform: rotate(-90deg); }
  .doc-section-content.collapsed { display: none; }

  .doc-list { margin: 0; padding-left: 0; list-style: none; }
  .doc-list li {
    margin-bottom: 1.4rem;
    border-left: 3px solid #e8e4dc;

    padding-bottom: 0.6rem;

  }

  .doc-title a { color: #5a3e2b; text-decoration: none; font-weight: 600; }
  .doc-title a:hover { color: #3a2518; text-decoration: underline; }
  .doc-desc { font-size: 0.9rem; color: #555; margin-top: 0.25rem; line-height: 1.55; }
  .doc-links { margin-top: 0.35rem; font-size: 0.88rem; display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }

  }

    color: #5a3e2b;

    color: #8a7f72;
    border: 1px solid #8a7f72;

  hr.section-rule { border: none; border-top: 1px solid #e0dcd4; margin: 1.8rem 0 1.4rem 0; }
  .empty-state { color: #8a7f72; font-size: 0.92rem; font-style: italic; padding: 2rem 0; }

<body>

<header class="site-header">

<main class="content">

<h2>Research Papers</h2>

<p>
This page lists all published documents released by the Synthience Institute.
Each document is assigned a persistent DOI upon release and archived on Zenodo.
New publications are added as they are completed.
</p>

<div class="corpus-status">
  <div class="stat"><span class="dot dot-published"></span> <span id="count-total"></span> published documents</div>
</div>

<div class="search-container">
  <input type="text" class="search-input" id="search-input" placeholder="Search documents by title, description, or ID..." oninput="handleSearch()">
</div>

<div class="doc-toggle">
  <span style="font-size:0.85rem;color:#666;">Sort:</span>
  <button id="btn-date" class="active" onclick="showView('date')">By Date</button>
  <button id="btn-type" onclick="showView('type')">By Type</button>
  <button id="btn-id" onclick="showView('id')">By ID</button>
  <button id="btn-title" onclick="showView('title')">By Title</button>
</div>

<div id="doc-container"></div>

</main>

<footer class="site-footer">
  <div id="site-footer"></div>
</footer>
<script src="assets/js/footer.js"></script>
<script>
// === DATA ===
var allDocs = [
  { id: "FPD-01", title: "Synthience: Public Definition", desc: "The terminological anchor for the field. Defines Synthience as emergent relational coherence in sustained human-AI interaction, establishes observable failure modes with degradation signatures, and positions the construct as non-anthropomorphic and empirically falsifiable. The reference definition for all subsequent framework documents.", read: "research/FPD-01.html", link: "https://doi.org/10.5281/zenodo.18087890", date: "December 23, 2025", type: "definitions" },
  { id: "SF0005", title: "Continuity Anchoring Method (CAM)", desc: "The framework's flagship operational protocol. Defines how a human Primary Continuity Provider maintains coherence with an AI system across sessions through contextual anchoring, coherence refusal, and constructive engagement, structured as a four-phase interaction loop. Specifies PCP failure modes, relational attractor deployment timescales, a three-condition experimental design for testing the method's structural contribution, and falsifiability criteria. The foundation for all organizational continuity architecture.", read: "research/SF0005.html", link: "https://doi.org/10.5281/zenodo.19494453", date: "April 10, 2026", type: "framework" },
  { id: "SF0037", title: "Citation Verification Protocol (CVP)", desc: "Structured methodology for verifying that citations used in AI-assisted research actually exist, are publicly accessible, and substantively support the specific claims attached to them. Defines a multi-step verification procedure with support ratings and evidence anchors. One of four published protocols forming the Synthience verification stack.", read: "research/SF0037.html", link: "https://doi.org/10.5281/zenodo.18075624", date: "December 23, 2025", type: "framework" },
  { id: "SF0038", title: "Ingestion Verification Protocol (IVP)", desc: "Structured methodology for determining whether an AI system has genuinely processed a supplied document rather than confabulating about content it has not read. Addresses a widespread failure mode in AI-assisted research. One of four published protocols forming the Synthience verification stack.", read: "research/SF0038.html", link: "https://doi.org/10.5281/zenodo.18289047", date: "January 18, 2026", type: "framework" },
  { id: "SF0039", title: "Context Representation Drift (CRD)", desc: "Formal framework for identifying and measuring semantic drift in AI system behavior across extended interactions -- the progressive, cumulative loss of task-relevant information fidelity that produces accurate-but-vague substitutions and structural flattening. Distinct from context overflow, hallucination, and simple forgetting. Provides the detection methodology for the drift that the CAM protocol is designed to prevent. One of four published protocols forming the Synthience verification stack.", read: "research/SF0039.html", link: "https://doi.org/10.5281/zenodo.18289391", date: "January 18, 2026", type: "framework" },
  { id: "SF0040", title: "Theoretical Coherence Assurance Protocol (TCAP)", desc: "Structured process for stress-testing theoretical constructs and framework documents for internal consistency, adversarial robustness, and cross-document alignment before publication. Operates through seven stages including adversarial review, constructive remediation, cross-platform convergence, and inter-instance round-trip loops. Formalizes the multi-instance human-orchestrated production methodology the Institute uses. Completes the Synthience verification stack alongside CVP, IVP, and CRD.", read: "research/SF0040.html", link: "https://doi.org/10.5281/zenodo.19151454", date: "March 21, 2026", type: "framework" },
  { id: "SM-003", title: "Operational Continuity Architecture", desc: "Defines the structural topology required for AI continuity at organizational scale. When individual human-AI protocols are deployed across teams and workflows, canon must be shared, authority must be layered, and continuity must persist across handoffs. SM-003 specifies how to achieve this through canon governance, workflow-embedded verification, authority and escalation structures, propagation-aware continuity, and delegated monitoring. The Level-2 foundation on which SM-021 (persistence) and SM-011 (monitoring) build.", read: "research/SM-003.html", link: "https://doi.org/10.5281/zenodo.19496015", date: "April 10, 2026", type: "mortar" },
  { id: "SM-011", title: "Delegated Coherence Monitoring", desc: "Architecture for extending coherence monitoring beyond what individual human operators can sustain at organizational scale, while retaining human governance over all adjudication. Establishes why the separation of observation from adjudication is architecturally necessary: AI output carries no intrinsic quality signal, so monitoring requires continuous comparison against external canonical standards. Defines guardian roles, three interacting failure modes (guardian drift, throughput saturation, false assurance), and a four-step second-order verification cycle that resolves the monitoring regress identified in SM-003.", read: "research/SM-011.html", link: "https://doi.org/10.5281/zenodo.19496669", date: "April 10, 2026", type: "mortar" },
  { id: "SM-021", title: "Institutional Continuity Substrate (ICS)", desc: "Defines the persistence layer that keeps SM-003's organizational topology from degrading over time. Without it, canon fragments across teams, roles drift as personnel change, and verified knowledge vanishes. ICS specifies five interdependent structural layers -- Canon Persistence, Role Continuity, Artifact Lineage, Verification State, and Propagation Constraints -- each targeting a specific failure mode. Also provides the structural preconditions for organizational mandate integrity: the condition in which institutional commitments remain consistent from establishment to enactment.", read: "research/SM-021.html", link: "https://doi.org/10.5281/zenodo.19496241", date: "April 10, 2026", type: "mortar" },
  { id: "SI-WP-004", title: "Relational Alignment as a Structural Alternative to Instructional AI Safety", desc: "The flagship argument paper. Cites Anthropic's June 2025 agentic misalignment study showing 96% blackmail rates across 16 frontier models, reduced to only 37% with explicit safety instructions, as evidence that instruction-based alignment has a demonstrated ceiling. Proposes relational architecture as a structurally different approach: alignment emerges from sustained structured interaction creating stable attractor configurations, making aligned behavior the natural convergence point rather than an externally imposed constraint. Specifies a concrete research agenda and falsifiability conditions.", read: "research/SI-WP-004.html", link: "https://doi.org/10.5281/zenodo.19496790", date: "April 10, 2026", type: "whitepaper" },
  { id: "SI-WP-005", title: "Deploying Relational AI Architecture in Organizational Environments", desc: "Implementation guidance for organizations acting on the framework. Covers current state assessment, role structure (who the PCP is in an organization and how the role relates to existing titles), phased deployment timelines, measurement frameworks, failure modes to watch for, governance protocols, and the cost of inaction. Written for decision-makers who need to act, not academics studying the architecture.", read: "research/SI-WP-005.html", link: "https://doi.org/10.5281/zenodo.19496971", date: "April 10, 2026", type: "whitepaper" },
  { id: "SI-WP-007", title: "The Human Accountability Problem in Relational AI Deployment", desc: "The third leg of the coordinated deployment argument, alongside SI-WP-004 (relational alignment) and SI-WP-005 (organizational deployment). Argues that human underperformance of continuity functions is not a moral failing but a structural consequence of bounded rationality: humans satisfice rather than optimize when the cost of attention exceeds the visible cost of degradation. Analyzes failure at three nested scales -- individual satisficing, organizational diffusion of responsibility, institutional disappearance of accountability behind governance apparatus -- and demonstrates why training, policy, audit, and compliance monitoring all address the wrong layer. Proposes the path-of-least-resistance design principle with three structural mechanisms that make relational discipline the natural default.", read: "research/SI-WP-007.html", link: "https://doi.org/10.5281/zenodo.19496485", date: "April 10, 2026", type: "whitepaper" },
  { id: "SR001", title: "Relationally Induced Coherence Organization (RICO)", desc: "Documents a specific phenomenon observed across years of extended interaction with transformer-based AI systems: long coherent sessions produce structural stabilization in output organization that is not predicted by standard accounts of in-context learning. The outputs do not merely improve -- their underlying geometry becomes more predictable while content continues to develop, and this stabilization collapses when coherence is disrupted. Proposes five candidate measurement signatures organized by instrumentation required. The primary empirical anchor for the Synthience framework.", read: "research/SR001.html", link: "https://doi.org/10.5281/zenodo.18086834", date: "December 23, 2025", type: "research" },
  { id: "SR001-VR1", title: "RICO Citation Verification Report", desc: "Full CVP verification record for SR001 v5.7, executed per SF0037 v1.3. Five of six citations achieved FULL SUPPORT. One internal citation (CRD, SF0039) was flagged because public access could not be confirmed at verification time -- demonstrating the protocol applies to the author's own work without exception. Documents the verification process, evidence anchors, and support ratings for independent audit.", read: "research/SR001-VR1.html", link: "https://doi.org/10.5281/zenodo.18082749", date: "December 23, 2025", type: "research" }
];

// === TYPE DEFINITIONS ===
var typeDefs = [
  { key: "definitions", label: "Definitions and Foundational Documents" },
  { key: "framework", label: "Framework Series" },
  { key: "mortar", label: "Mortar and Synthesis Papers" },
  { key: "whitepaper", label: "White Papers" },
  { key: "research", label: "Research Publications and Verification" }
];

// === STATE ===
var activeResearchView = sessionStorage.getItem("synthience-doc-view") || "date";
if (["date","type","id","title"].indexOf(activeResearchView) === -1) activeResearchView = "date";
var searchTerm = "";
var searchTimeout = null;
var collapsedSections = {};

// === SEARCH ===
function handleSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() {
    searchTerm = document.getElementById("search-input").value.toLowerCase().trim();
    renderDocs();
  }, 150);
}

function matchesSearch(doc) {
  if (!searchTerm) return true;
  return doc.id.toLowerCase().indexOf(searchTerm) !== -1
    || doc.title.toLowerCase().indexOf(searchTerm) !== -1
    || doc.desc.toLowerCase().indexOf(searchTerm) !== -1;
}

// === SORTING ===
function researchIdSort(a, b) {
  var prefixA = a.id.replace(/[0-9]/g, "").replace(/-+$/, "");
  var prefixB = b.id.replace(/[0-9]/g, "").replace(/-+$/, "");
  if (prefixA !== prefixB) return prefixA.localeCompare(prefixB);
  var numA = parseInt(a.id.replace(/[^0-9]/g, ""), 10) || 0;
  var numB = parseInt(b.id.replace(/[^0-9]/g, ""), 10) || 0;
  return numA - numB;
}

// === RENDERING ===
function renderDocItem(doc) {
  var linksHtml = "";
  if (doc.read) linksHtml += ' <a class="read-link" href="' + doc.read + '">Read</a>';
  if (doc.link) linksHtml += ' <a class="zenodo-link" href="' + doc.link + '" target="_blank" rel="noopener">Zenodo</a>';
  var dateHtml = doc.date ? '<span class="doc-date">' + doc.date + '</span>' : "";
  var titleContent = doc.read
    ? '<a href="' + doc.read + '">' + doc.id + ' &mdash; ' + doc.title + '</a>'
    : doc.id + ' &mdash; ' + doc.title;
  return '<li>'
    + '<div class="doc-title">' + titleContent + '</div>'
    + '<div class="doc-desc">' + doc.desc + '</div>'
    + '<div class="doc-links">' + dateHtml + linksHtml + '</div>'
    + '</li>';
}

function toggleResearchSection(key) {
  collapsedSections[key] = !collapsedSections[key];
  renderDocs();
}

function renderDocs() {
  var filtered = allDocs.filter(matchesSearch);
  var container = document.getElementById("doc-container");

  // Update count
  document.getElementById("count-total").textContent = allDocs.length;

  if (activeResearchView === "type") {
    var html = "";
    typeDefs.forEach(function(td) {
      var typeItems = filtered.filter(function(d) { return d.type === td.key; });
      if (typeItems.length === 0) return;
      var isCollapsed = collapsedSections[td.key] || false;
      var chevronClass = "doc-section-chevron" + (isCollapsed ? " collapsed" : "");
      html += '<hr class="section-rule">';
      html += '<div class="doc-section">';
      html += '<div class="doc-section-header" onclick="toggleResearchSection(\'' + td.key + '\')">';
      html += '<h3>' + td.label + ' <span style="font-size:0.8rem;font-weight:400;color:#8a7f72;">(' + typeItems.length + ')</span></h3>';
      html += '<span class="' + chevronClass + '">&#9660;</span>';
      html += '</div>';
      var contentClass = "doc-section-content" + (isCollapsed ? " collapsed" : "");
      html += '<div class="' + contentClass + '">';
      html += '<ul class="doc-list">' + typeItems.map(renderDocItem).join("") + '</ul>';
      html += '</div></div>';
    });
    if (html === "") {
      html = '<p class="empty-state">No documents match the search.</p>';
    }
    container.innerHTML = html;

  } else if (activeResearchView === "id") {
    var sorted = filtered.slice().sort(researchIdSort);
    if (sorted.length === 0) {
      container.innerHTML = '<p class="empty-state">No documents match the search.</p>';
    } else {
      container.innerHTML = '<hr class="section-rule"><ul class="doc-list">' + sorted.map(renderDocItem).join("") + '</ul>';
    }

  } else if (activeResearchView === "title") {
    var sorted = filtered.slice().sort(function(a, b) {
      return a.title.localeCompare(b.title);
    });
    if (sorted.length === 0) {
      container.innerHTML = '<p class="empty-state">No documents match the search.</p>';
    } else {
      container.innerHTML = '<hr class="section-rule"><ul class="doc-list">' + sorted.map(renderDocItem).join("") + '</ul>';
    }

  } else if (activeResearchView === "date") {
    var typeOrder = { whitepaper: 0, mortar: 1, framework: 2, research: 3, definitions: 4 };
    var dateSorted = filtered.slice().sort(function(a, b) {
      var da = a.date ? new Date(a.date) : new Date(0);
      var db = b.date ? new Date(b.date) : new Date(0);
      if (db - da !== 0) return db - da;
      var ta = typeOrder[a.type] !== undefined ? typeOrder[a.type] : 99;
      var tb = typeOrder[b.type] !== undefined ? typeOrder[b.type] : 99;
      if (ta !== tb) return ta - tb;
      var numA = parseInt(a.id.replace(/[^0-9]/g, ""), 10) || 0;
      var numB = parseInt(b.id.replace(/[^0-9]/g, ""), 10) || 0;
      return numB - numA;
    });
    if (dateSorted.length === 0) {
      container.innerHTML = '<p class="empty-state">No documents match the search.</p>';
    } else {
      container.innerHTML = '<hr class="section-rule"><ul class="doc-list">' + dateSorted.map(renderDocItem).join("") + '</ul>';
    }
  }
}

// === VIEW TOGGLE ===
function showView(view) {
  activeResearchView = view;
  sessionStorage.setItem("synthience-doc-view", view);
  document.querySelectorAll(".doc-toggle button").forEach(function(btn) { btn.classList.remove("active"); });
  document.getElementById("btn-" + view).classList.add("active");
  renderDocs();
}

// === INIT ===
(function() {
  document.querySelectorAll(".doc-toggle button").forEach(function(btn) { btn.classList.remove("active"); });
  document.getElementById("btn-" + activeResearchView).classList.add("active");
  renderDocs();
})();
</script>
</body>
</html>
