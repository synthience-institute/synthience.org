// === STATE ===
var activeUpdateTag = "all";
var searchTerm = "";
var searchTimeout = null;

// === TAG FILTER ===
function getUpdateTags() {
  var tags = {};
  allUpdates.forEach(function(u) { tags[u.tag] = true; });
  return Object.keys(tags);
}

function renderUpdateTagButtons() {
  var existing = getUpdateTags();
  var container = document.getElementById("tag-filter");
  var html = '<span>Filter:</span>';
  html += '<button class="' + (activeUpdateTag === "all" ? "active" : "") + '" onclick="setUpdateTag(\'all\')">All</button>';
  existing.forEach(function(tag) {
    html += '<button class="' + (activeUpdateTag === tag ? "active" : "") + '" onclick="setUpdateTag(\'' + tag + '\')">' + tag + '</button>';
  });
  container.innerHTML = html;
}

function setUpdateTag(tag) {
  activeUpdateTag = tag;
  renderUpdateTagButtons();
  renderUpdates();
}

// === SEARCH ===
function handleSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() {
    searchTerm = document.getElementById("search-input").value.toLowerCase().trim();
    renderUpdates();
  }, 150);
}

// === RENDERING ===
function renderUpdates() {
  var filtered = allUpdates.slice();

  if (activeUpdateTag !== "all") {
    filtered = filtered.filter(function(u) { return u.tag === activeUpdateTag; });
  }

  if (searchTerm) {
    filtered = filtered.filter(function(u) {
      return u.title.toLowerCase().indexOf(searchTerm) !== -1
        || u.body.toLowerCase().indexOf(searchTerm) !== -1
        || u.tag.toLowerCase().indexOf(searchTerm) !== -1;
    });
  }

  var container = document.getElementById("update-list");

  if (filtered.length === 0) {
    container.innerHTML = '<li class="empty-state">No updates match the selected filters.</li>';
    return;
  }

  var html = "";
  filtered.forEach(function(u) {
    var titleHtml = u.link
      ? '<a href="' + u.link + '">' + u.title + '</a>'
      : u.title;
    var actionHtml = u.actionLink
      ? ' <a href="' + u.actionLink + '">' + u.action + ' &rarr;</a>'
      : '';
    html += '<li>'
      + '<div class="update-date">' + u.dateDisplay + '</div>'
      + '<div class="update-title">' + titleHtml + '</div>'
      + '<div class="update-body">'
      + '<span class="update-tag">' + u.tag + '</span>'
      + u.body + actionHtml
      + '</div>'
      + '</li>';
  });
  container.innerHTML = html;
}

// === INIT ===
renderUpdateTagButtons();
