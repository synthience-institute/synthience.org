  var metaHtml = u.read

  var liClass = u.read ? ' class="has-link"' : '';
  var liClick = u.read ? ' onclick="window.location=\'' + u.read + '\'"' : '';

    + '<div class="update-date">' + u.dateDisplay + '</div>'
    + '<div class="update-title">' + titleHtml + '</div>'
    + '<div class="update-body"><span class="update-tag">' + u.tag + '</span>' + u.body + '</div>'
